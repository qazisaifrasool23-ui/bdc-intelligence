<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fund Deep Dive - Credit Canon</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f4f7;
  /* FactSet chart palette */
  --c1:#111418;--c1a:rgba(17,20,24,.08);
  --c2:#70AD47;--c2a:rgba(112,173,71,.08);
  --c3:#C00000;--c3a:rgba(192,0,0,.07);
  --c4:#E07B00;--c4a:rgba(224,123,0,.08);
  --c5:#264478;--c5a:rgba(38,68,120,.08);
  --c6:#5B9BD5;--c6a:rgba(91,155,213,.08);
  --cref:#A5A5A5;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#e8eaed;
  --card:#ffffff;--card2:#ffffff;--border:#e2e6ea;--border2:#ced4da;
  --text:#1a1d23;--text2:#3d4f63;--text3:#6c7a8d;--text4:#adb5bd;
  --blue:#111418;--blue2:#eceef0;--blue3:#d9dce0;
  --green:#70AD47;--green2:#e6f5f0;
  --amber:#E07B00;--amber2:#fff3e0;
  --red:#C00000;--red2:#fdf2f3;
  --purple:#6d28d9;--purple2:#f3f0ff;
  --mono:"Roboto Mono",monospace;
  --sans:"Roboto",sans-serif;
  --serif:"Roboto",sans-serif;
  --sh:0 1px 3px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --glow:0 0 20px rgba(17,20,24,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── TOPBAR ── */
.topbar{height:32px;background:#000000;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 20px;gap:0}
.tbi{display:flex;align-items:center;gap:6px;padding:0 14px;border-right:1px solid rgba(255,255,255,.12);font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.65);height:32px}
.tbi .v{color:rgba(255,255,255,.95);font-weight:500}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--green)}50%{opacity:.4;box-shadow:0 0 2px var(--green)}}
.tbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.live-badge{background:rgba(10,124,82,.1);border:1px solid rgba(10,124,82,.2);color:var(--green);font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:2px;letter-spacing:.8px}

/* ── NAVBAR ── */
/* === Top ribbon: unified Rogo-style aesthetic (Roboto, off-white, pill CTA) === */
.navbar{height:64px;background:#f7f7f7;border-bottom:1px solid #ececec;display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:48px}
.logo-mark{width:28px;height:28px;background:#151515;border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:15px;height:15px;fill:#fff}
.logo-text{font-family:var(--sans);font-size:15px;font-weight:600;color:#151515;letter-spacing:-.3px}
.logo-text span{color:#151515;font-weight:400}
.nav-links{display:flex;align-items:center;gap:4px;margin:0 auto}
.nav-link{padding:8px 16px;font-size:13.5px;font-weight:500;color:#3a3a3a;text-decoration:none;border-radius:6px;white-space:nowrap;transition:color .15s,background .15s;border-bottom:none}
.nav-link:hover{color:#151515;background:rgba(0,0,0,.04)}
.nav-link.on{color:#151515;font-weight:600;background:transparent;border-bottom:none}
.nav-pill{font-size:8px;font-family:var(--mono);background:#ececec;color:#3a3a3a;padding:2px 6px;border-radius:3px;margin-left:5px;border:none}
.nav-soon{font-size:8px;font-family:var(--mono);background:#ececec;color:#9a9a9a;padding:2px 6px;border-radius:3px;margin-left:5px}
.nav-right{margin-left:0;display:flex;align-items:center;gap:14px}
.btn-outline{height:auto;padding:8px 4px;border:none;border-radius:0;background:transparent;color:#151515;font-size:13.5px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:opacity .15s}
.btn-outline:hover{border-color:transparent;color:#151515;opacity:.65}
.btn-primary{height:36px;padding:0 20px;border:none;border-radius:999px;background:#151515;color:#fff;font-size:13px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:background .15s,transform .15s;letter-spacing:.1px}
.btn-primary:hover{background:#000;box-shadow:none;transform:none}
/* nav overlay variant (fund.html, screener.html): same look, no transparency over hero */
.navbar.nav-ov{background:#f7f7f7;border-bottom:1px solid #ececec}


/* ── HERO ── */
.hero{background:linear-gradient(135deg,#000000 0%,#15181d 55%,#2a2f37 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.hero-glow{position:absolute;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(17,20,24,.15) 0%,transparent 70%);pointer-events:none}
.hero-body{position:relative;z-index:1;padding:28px 28px 0}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.fund-ticker{font-family:var(--mono);font-size:48px;font-weight:500;color:#fff;line-height:1;letter-spacing:-2px;margin-bottom:4px}
.fund-name{font-family:var(--serif);font-style:italic;font-size:22px;color:rgba(255,255,255,.88);margin-bottom:8px;font-weight:300}
.fund-meta{display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.7)}
.fund-meta span{display:flex;align-items:center;gap:4px}
.fund-meta span::before{content:"·";color:var(--border2)}
.fund-meta span:first-child::before{display:none}
.badges{display:flex;gap:6px;margin-top:12px}
.badge{display:inline-flex;align-items:center;font-size:8.5px;font-family:var(--mono);padding:3px 9px;border-radius:3px;font-weight:500;letter-spacing:.4px}
.badge-blue{background:rgba(17,20,24,.12);color:var(--blue);border:1px solid rgba(17,20,24,.2)}
.badge-green{background:rgba(10,124,82,.1);color:var(--green);border:1px solid rgba(10,124,82,.15)}
.badge-gray{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.hero-kpis{display:grid;grid-template-columns:repeat(8,1fr);border-top:1px solid rgba(255,255,255,.1);margin-top:20px}
.kpi{padding:14px 16px;border-right:1px solid rgba(255,255,255,.08)}
.kpi:last-child{border-right:none}
.kpi-label{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-value{font-family:var(--mono);font-size:18px;font-weight:500;color:#fff;line-height:1;margin-bottom:3px}
.kpi-value.up{color:var(--green)}.kpi-value.dn{color:var(--red)}.kpi-value.am{color:var(--amber)}
.kpi-sub{font-size:9px;color:rgba(255,255,255,.55);font-family:var(--mono)}

/* ── TABS ── */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto;position:sticky;top:52px;z-index:100;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{height:42px;padding:0 14px;font-size:11.5px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;white-space:nowrap;transition:all .15s;user-select:none;flex-shrink:0;font-family:var(--sans)}
.tab:hover{color:var(--text2)}.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ── CONTENT ── */
.content{padding:20px 24px;min-height:calc(100vh - 200px)}
.sec{display:none}.sec.on{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--sh);overflow:visible;margin-bottom:16px}
.ch{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card2)}
.ct{font-size:12.5px;font-weight:600;color:var(--text);font-family:var(--sans)}
.cs{font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.cw{position:relative;padding:12px 16px 14px;overflow:visible}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}

/* ── METRIC GRID ── */
.mg{display:grid;grid-template-columns:repeat(4,1fr)}
.mgi{padding:14px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s}
.mgi:hover{background:var(--bg3)}
.mgi:nth-child(4n){border-right:none}
.mgi:nth-last-child(-n+4){border-bottom:none}
.mgl{font-size:8px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.mgv{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px}
.mgn{font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.gn{color:var(--green)!important}.rd{color:var(--red)!important}.am{color:var(--amber)!important}.bl{color:var(--blue)!important}

/* ── CHART LEGEND ── */
.leg{display:flex;gap:14px;padding:4px 16px 12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.ll{width:18px;height:2px;border-radius:1px;flex-shrink:0}
.ld{width:18px;height:0;border-top:2px dashed;flex-shrink:0}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── TIME SELECTOR ── */
.tsbar{display:flex;gap:3px;align-items:center}
.tsbtn{height:22px;padding:0 9px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);font-size:9.5px;font-family:var(--mono);cursor:pointer;transition:all .12s}
.tsbtn:hover{border-color:var(--blue);color:var(--text2)}
.tsbtn.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
.regime-btn{height:22px;padding:0 9px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);font-size:9.5px;font-family:var(--mono);cursor:pointer;transition:all .12s;margin-left:6px}
.regime-btn:hover{border-color:var(--text3);color:var(--text2)}
.regime-btn.on{background:rgba(71,85,105,.1);border-color:rgba(71,85,105,.4);color:rgba(71,85,105,.9);font-weight:500}

/* ── LOLLIPOP ── */
.lpop-row{display:flex;align-items:center;padding:7px 0;gap:10px}
.lpop-row.me{background:rgba(17,20,24,.06);border-radius:6px;padding:7px 10px;margin:0 -10px}
.lpop-rank{font-family:var(--mono);font-size:9px;color:var(--text4);width:14px;flex-shrink:0;text-align:right}
.lpop-tk{font-family:var(--mono);font-size:11.5px;font-weight:500;width:48px;flex-shrink:0}
.lpop-bar{flex:1;position:relative;height:28px}
.lpop-track{position:absolute;top:50%;left:0;right:0;height:4px;background:var(--bg3);border-radius:2px;transform:translateY(-50%)}
.lpop-fill{position:absolute;top:50%;left:0;height:4px;background:rgba(17,20,24,.25);border-radius:2px;transform:translateY(-50%)}
.lpop-dot{position:absolute;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid var(--bg);z-index:2}
.lpop-val{font-family:var(--mono);font-size:12.5px;font-weight:500;width:58px;text-align:right;flex-shrink:0}

/* ── TABLES ── */
.dtbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px}
.dtbl th{padding:9px 14px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border2);font-size:8.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.dtbl th:not(:first-child){text-align:right}
.dtbl td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
.dtbl td:not(:first-child){text-align:right;color:var(--text)}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr:hover td{background:var(--bg3)}

/* ── SIGNAL BADGES ── */
.sig{display:inline-flex;align-items:center;font-size:9px;font-family:var(--mono);padding:2px 8px;border-radius:3px;font-weight:500;letter-spacing:.2px}
.sg{background:rgba(112,173,71,.1);color:var(--green);border:1px solid rgba(112,173,71,.2)}
.sr{background:rgba(192,0,0,.1);color:var(--red);border:1px solid rgba(192,0,0,.2)}
.sa{background:rgba(224,123,0,.1);color:var(--amber);border:1px solid rgba(224,123,0,.2)}
.sb{background:rgba(17,20,24,.1);color:var(--blue);border:1px solid rgba(17,20,24,.2)}
.sp{background:rgba(109,40,217,.1);color:var(--purple);border:1px solid rgba(109,40,217,.2)}

/* ── EVENT FEED ── */
.evt{display:flex;padding:12px 18px;border-bottom:1px solid var(--border);gap:12px;transition:background .15s}
.evt:hover{background:var(--bg3)}.evt:last-child{border-bottom:none}
.evt-dt{font-family:var(--mono);font-size:9px;color:var(--text3);width:52px;flex-shrink:0;padding-top:2px}
.evt-tag{font-family:var(--mono);font-size:7.5px;padding:3px 7px;border-radius:2px;flex-shrink:0;margin-top:1px;letter-spacing:.4px;font-weight:600}
.ee{background:rgba(17,20,24,.12);color:var(--blue);border:1px solid rgba(17,20,24,.2)}
.ed{background:rgba(10,124,82,.1);color:var(--green);border:1px solid rgba(10,124,82,.15)}
.ec{background:rgba(109,40,217,.1);color:var(--purple);border:1px solid rgba(109,40,217,.2)}
.er{background:rgba(184,20,31,.1);color:var(--red);border:1px solid rgba(184,20,31,.2)}
.evt-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;font-family:var(--sans)}
.evt-detail{font-size:10.5px;color:var(--text3);line-height:1.5;font-family:var(--mono)}

/* ── TOOLTIP ── */
.tip-i{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;border:1px solid var(--border2);color:var(--text3);font-size:9px;font-family:Georgia,serif;font-style:italic;cursor:help;position:relative;vertical-align:middle;margin-left:3px;transition:all .12s}
.tip-i:hover{border-color:var(--blue);color:var(--blue)}.tip-i:hover .tip-b{display:block}
.tip-b{display:none;position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:#0a0e1a;color:var(--text);font-size:11px;font-family:var(--sans);font-style:normal;padding:10px 13px;border-radius:8px;white-space:normal;z-index:9999;min-width:200px;max-width:260px;line-height:1.5;box-shadow:0 8px 32px rgba(0,0,0,.6);border:1px solid var(--border2)}
.tip-b::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#0a0e1a}
.tip-b strong{display:block;font-family:var(--mono);font-size:9px;margin-bottom:4px;color:var(--blue);font-weight:500}

/* ── WARN ── */
.warn{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(154,82,0,.06);border:1px solid rgba(154,82,0,.15);border-radius:8px;font-size:11px;color:var(--amber);margin-bottom:16px;font-family:var(--mono)}

/* ── MATURITY LADDER ── */
.mat-bar{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px}
.mat-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.mat-fill{background:var(--blue);border-radius:4px 4px 0 0;width:100%;transition:height .4s ease;min-height:4px;position:relative}
.mat-fill:hover{filter:brightness(1.2)}
.mat-label{font-family:var(--mono);font-size:8.5px;color:var(--text3);text-align:center}
.mat-value{font-family:var(--mono);font-size:10px;color:var(--text);font-weight:500;text-align:center}

/* ── SECTOR BAR ── */
.sec-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-name{font-size:11px;color:var(--text2);width:160px;flex-shrink:0;font-family:var(--sans)}
.sec-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.sec-fill{height:100%;border-radius:3px;transition:width .5s ease}
.sec-val{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text);width:36px;text-align:right;flex-shrink:0}

/* ── DEBT DONUT LEGEND ── */
.dleg{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;padding:12px 16px}
.dleg-item{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--text2)}
.dleg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── PEER RADAR ── */
.radar-wrap{position:relative;padding:16px}

/* ── MARKET KPI ── */
.mkt-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr)}
.mkt-kpi{padding:14px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s}
.mkt-kpi:hover{background:var(--bg3)}
.mkt-kpi:nth-child(4n){border-right:none}
.mkt-kpi:nth-last-child(-n+4){border-bottom:none}
.mkt-kpi-label{font-size:8px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.mkt-kpi-value{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px}
.mkt-kpi-note{font-size:9.5px;color:var(--text3);font-family:var(--mono)}

/* ── SCROLLABLE ── */
.scroll-x{overflow-x:auto;scrollbar-width:thin}
.evt-link{color:var(--text);text-decoration:none;border-bottom:1px dotted var(--border2);transition:color .15s}
.evt-link:hover{color:var(--blue)}
.kpi-tip{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;border:1px solid var(--border2);color:var(--text3);font-size:8.5px;font-style:italic;font-family:Georgia,"Times New Roman",serif;cursor:help;margin-left:4px;vertical-align:middle;transition:all .15s;position:relative;font-weight:400;letter-spacing:0}
.kpi-tip:hover{border-color:var(--blue);color:var(--blue)}
.kpi-tip[title]:hover::after{content:attr(title);position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:#000000;color:#fff;font-size:10.5px;font-family:"Roboto",sans-serif;font-style:normal;padding:8px 12px;border-radius:6px;white-space:normal;z-index:9999;min-width:200px;max-width:260px;line-height:1.5;box-shadow:0 4px 18px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.08);pointer-events:none}
.kpi-tip[title]:hover::before{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#000000;pointer-events:none}


/* ===== Credit Canon: restricted-access nav pill + loading skeletons ===== */
.cc-nav-pill{background:#fff3e0;color:#E07B00;font-family:"Roboto Mono",monospace;font-size:8.5px;font-weight:500;padding:2px 7px;border-radius:999px;margin-left:6px;letter-spacing:.3px;vertical-align:middle;display:inline-flex;align-items:center;line-height:1}
@keyframes cc-shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.cc-sk{background:#e9edf1;background-image:linear-gradient(90deg,#e9edf1 0,#f4f6f8 200px,#e9edf1 400px);background-size:800px 100%;animation:cc-shimmer 1.3s linear infinite;border-radius:4px;display:block}
.cc-sk-dark{background:rgba(255,255,255,.07);background-image:linear-gradient(90deg,rgba(255,255,255,.05) 0,rgba(255,255,255,.14) 200px,rgba(255,255,255,.05) 400px);background-size:800px 100%;animation:cc-shimmer 1.3s linear infinite;border-radius:4px;display:block}
@media(prefers-reduced-motion:reduce){.cc-sk,.cc-sk-dark{animation:none}}
</style>
<style>
body{margin:0;padding:0;overflow-x:hidden}
#frame-wrap{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0}

function getType(ticker){return FM[ticker]&&FM[ticker].fund_type==="nontraded"?"nontraded":"traded";}
function buildSrc(ticker){
    var m=FM[ticker]||{};
    var isNT=m.fund_type==="nontraded";
    var base=isNT?"nontraded_template.html":"traded_template.html";
    var q="?ticker="+encodeURIComponent(ticker);
    if(m.name) q+="&name="+encodeURIComponent(m.name);
    if(m.mgr)  q+="&mgr="+encodeURIComponent(m.mgr);
    if(m.qtr)  q+="&qtr="+encodeURIComponent(m.qtr);
    if(m.aum)  q+="&aum="+encodeURIComponent((+m.aum).toFixed(1));
    if(m.gate) q+="&gate=1";
    if(m.mgmt_type==="internal") q+="&internal=1";
    return base+q;
  }
function loadFund(ticker){
  history.pushState(null,"","fund.html?ticker="+ticker);
  document.getElementById("fund-frame").src=buildSrc(ticker);
  document.title=ticker+" - Credit Canon";
  document.getElementById("COV_INFO").textContent="";
}
function makeItem(f,cb){
  var d=document.createElement("div");
  d.className="di";
  var tc=f.type==="traded"?"#2E75B6":"#E07B00";
  d.innerHTML="<span style='font-family:var(--mono);font-size:10px;font-weight:600;color:"+tc+";min-width:46px'>"+f.tk+"</span>"+
    "<span style='font-size:10px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+(f.name||f.tk)+"</span>"+
    (f.eqs?"<span class='pill "+(f.eqs>=4?"pill-g":f.eqs>=3?"pill-a":"pill-r")+"'>"+f.eqs.toFixed(1)+"</span>":"");
  d.addEventListener("mouseover",function(){this.style.background="var(--bg3)";});
  d.addEventListener("mouseout",function(){this.style.background="";});
  d.addEventListener("click",function(){cb(f.tk);});
  return d;
}
function fillDrop(dd,q,cb){
  if(!q){dd.style.display="none";return;}
  var lq=q.toLowerCase();
  var hits=FL.filter(function(f){return (f.tk||"").toLowerCase().indexOf(lq)>=0||(f.name||"").toLowerCase().indexOf(lq)>=0;}).slice(0,8);
  if(!hits.length){dd.style.display="none";return;}
  dd.innerHTML="";
  hits.forEach(function(f){
    dd.appendChild(makeItem(f,function(tk){
      loadFund(tk);
      dd.style.display="none";
      var fpI=document.getElementById("FP_INP");if(fpI)fpI.value="";
    }));
  });
  dd.style.display="block";
}

var UNIVERSE=[];      /* [{ticker, display_name}, ...] sorted by display_name */
var FULL_VISIBLE=[];  /* currently filtered subset */
var FULL_HL=-1;       /* keyboard highlight index */

function fullRenderRows(query){
  var dd=document.getElementById("FP_DD");
  if(!dd)return;
  var q=(query||"").toLowerCase().trim();
  FULL_VISIBLE=q?UNIVERSE.filter(function(f){
    return f.ticker.toLowerCase().indexOf(q)>=0||f.display_name.toLowerCase().indexOf(q)>=0;
  }):UNIVERSE.slice();
  FULL_HL=-1;
  if(!FULL_VISIBLE.length){
    dd.innerHTML='<div class="di" style="cursor:default;color:var(--text3);font-size:10px">No funds match</div>';
    dd.style.display="block";
    return;
  }
  var html=FULL_VISIBLE.map(function(f,i){
    return '<div class="di" data-idx="'+i+'" data-tk="'+f.ticker+'">'
      +'<span style="flex:1;font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.display_name+'</span>'
      +'<span style="font-family:var(--mono);font-size:10px;font-weight:600;color:var(--blue);min-width:50px;text-align:right">'+f.ticker+'</span>'
      +'</div>';
  }).join("");
  dd.innerHTML=html;
  dd.style.display="block";
}

function fullSetHighlight(i){
  var dd=document.getElementById("FP_DD");if(!dd)return;
  var rows=dd.querySelectorAll(".di");
  rows.forEach(function(el,n){el.style.background=(n===i)?"var(--bg3)":"";});
  FULL_HL=i;
  if(i>=0&&rows[i])rows[i].scrollIntoView({block:"nearest"});
}

function fullSelect(idx){
  var pick=FULL_VISIBLE[idx];if(!pick)return;
  loadFund(pick.ticker);
  var dd=document.getElementById("FP_DD");if(dd)dd.style.display="none";
  var fpI=document.getElementById("FP_INP");if(fpI){fpI.value="";fpI.blur();}
}

function wireFullDropdown(){
  var fpI=document.getElementById("FP_INP"),fpD=document.getElementById("FP_DD");
  if(!fpI||!fpD)return;
  fpI.addEventListener("focus",function(){fullRenderRows(this.value);});
  fpI.addEventListener("input",function(){fullRenderRows(this.value);});
  fpI.addEventListener("keydown",function(e){
    if(fpD.style.display!=="block")return;
    if(e.key==="ArrowDown"){e.preventDefault();fullSetHighlight(Math.min(FULL_VISIBLE.length-1,FULL_HL+1));}
    else if(e.key==="ArrowUp"){e.preventDefault();fullSetHighlight(Math.max(0,FULL_HL-1));}
    else if(e.key==="Enter"){e.preventDefault();fullSelect(FULL_HL>=0?FULL_HL:0);}
    else if(e.key==="Escape"){e.preventDefault();fpD.style.display="none";fpI.blur();}
  });
  fpD.addEventListener("click",function(e){
    var row=e.target.closest(".di");
    if(!row||row.getAttribute("data-idx")===null)return;
    fullSelect(parseInt(row.getAttribute("data-idx"),10));
  });
  fpD.addEventListener("mouseover",function(e){
    var row=e.target.closest(".di");
    if(!row||row.getAttribute("data-idx")===null)return;
    fullSetHighlight(parseInt(row.getAttribute("data-idx"),10));
  });
  /* click-outside closes */
  document.addEventListener("click",function(e){
    if(!e.target.closest(".fp"))fpD.style.display="none";
  });
}

function loadDirectoryAndWire(){
  return fetch("data/universe/fund_directory.json")
    .then(function(r){return r.json();})
    .then(function(d){
      var funds=(d&&d.funds)||[];
      UNIVERSE=funds.map(function(f){return {ticker:f.ticker,display_name:f.display_name||f.ticker};})
                    .sort(function(a,b){return a.display_name.toLowerCase().localeCompare(b.display_name.toLowerCase());});
      var fpI=document.getElementById("FP_INP");
      if(fpI)fpI.placeholder="Select one of the "+UNIVERSE.length+" US BDC funds";
    })
    .catch(function(){/* leave fallback placeholder + empty UNIVERSE */});
}

document.addEventListener("DOMContentLoaded",function(){
  wireFullDropdown();
  loadDirectoryAndWire();
  var btns=[["BTN_ARCC","ARCC"],["BTN_OBDC","OBDC"],["BTN_FSK","FSK"],["BTN_MAIN","MAIN"],
            ["BTN_BCRED","BCRED"],["BTN_HLEND","HLEND"],["BTN_PSEC","PSEC"]];
  btns.forEach(function(b){
    var el=document.getElementById(b[0]);if(!el)return;
    (function(tk){el.addEventListener("click",function(){loadFund(tk);});})(b[1]);
  });
  var qs=new URLSearchParams(window.location.search);
  loadFund(qs.get("ticker")||"ARCC");
});

</script>
