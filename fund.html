<style>
:root{
  --bg:#fff;--bg2:#f7f9fc;--bg3:#eef1f6;--border:#e2e7ef;--border2:#c8d3e0;
  --text:#0d1b2a;--text2:#4a5870;--text3:#8a97a8;--text4:#b8c4d0;
  --blue:#1a56db;--blue2:#e8f0fe;--green:#0a8f5c;--green2:#e6f7f1;
  --amber:#a05c00;--amber2:#fef3e2;--red:#c0182a;--red2:#fef2f4;
  --navy:#0b2038;--purple:#6d28d9;--teal:#0891b2;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--serif:'Libre Baskerville',serif;

}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg2);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.topbar{height:30px;background:var(--navy);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:300}
.tb{display:flex;align-items:center;gap:5px;padding:0 12px;border-right:1px solid rgba(255,255,255,.1);font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.45);white-space:nowrap}
.tb .v{color:rgba(255,255,255,.82);font-weight:500}
.dot{width:5px;height:5px;border-radius:50%;background:#34d399;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tb-r{margin-left:auto}
.free-tag{background:rgba(52,211,153,.15);color:#34d399;font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid rgba(52,211,153,.25)}
.nav{height:50px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;position:sticky;top:30px;z-index:299;box-shadow:var(--sh1)}
.logo{display:flex;align-items:center;gap:9px;margin-right:28px;text-decoration:none}
.logo-box{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-box svg{width:15px;height:15px;fill:white}
.logo-w{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-w span{color:var(--blue)}
.ntabs{display:flex;height:50px}
.ntab{height:50px;padding:0 13px;display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.ntab:hover{color:var(--text);background:var(--bg2)}.ntab.on{color:var(--blue);border-bottom-color:var(--blue)}
.ntab .pill{font-size:9px;font-family:var(--mono);background:var(--blue2);color:var(--blue);padding:1px 5px;border-radius:3px}
.ntab .soon{font-size:9px;font-family:var(--mono);background:var(--bg3);color:var(--text4);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.ntab.dim{opacity:.45;cursor:not-allowed;pointer-events:none}
.nright{margin-left:auto;display:flex;gap:8px}
.btn1{height:30px;padding:0 13px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer}
.btn2{height:30px;padding:0 14px;border:none;border-radius:6px;background:var(--blue);color:#fff;font-size:12px;font-family:var(--font);font-weight:600;cursor:pointer}
.layout{display:flex;min-height:calc(100vh - 80px)}
.sb{width:220px;min-width:220px;background:var(--bg);border-right:1px solid var(--border);position:sticky;top:80px;height:calc(100vh - 80px);overflow-y:auto;flex-shrink:0}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;height:28px;padding:0 8px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;font-size:11.5px;font-family:var(--font);outline:none;color:var(--text)}
.sb-search input:focus{border-color:var(--blue)}
.sb-fund{height:48px;padding:0 12px;display:flex;align-items:center;gap:8px;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid var(--border);transition:background .1s}
.sb-fund:hover{background:var(--bg2)}.sb-fund.on{background:var(--blue2);border-left-color:var(--blue)}
.sb-tk{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--blue);min-width:52px}
.sb-info{display:flex;flex-direction:column;min-width:0;flex:1}
.sb-nm{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-meta{font-size:9px;color:var(--text3);font-family:var(--mono)}
.sb-type{font-size:8.5px;font-family:var(--mono);padding:1px 4px;border-radius:2px;flex-shrink:0}
.t-badge{background:var(--blue2);color:var(--blue)}.nt-badge{background:var(--green2);color:var(--green)}
.content{flex:1;min-width:0;overflow-x:hidden}
.fh{background:linear-gradient(140deg,var(--navy) 0%,#0e3358 55%,#1a56db 100%);padding:24px 28px;position:relative;overflow:hidden}
.fh-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
.fh-in{position:relative;z-index:1}
.fh-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px}
.fh-tk{font-family:var(--mono);font-size:32px;font-weight:500;color:#fff;line-height:1}
.fh-name{font-family:var(--serif);font-size:18px;color:rgba(255,255,255,.9);line-height:1.2;margin-bottom:3px}
.fh-sub{font-size:11px;color:rgba(255,255,255,.5);font-family:var(--mono)}
.fh-pill{display:inline-flex;align-items:center;font-size:9px;font-family:var(--mono);padding:2px 8px;border-radius:3px;font-weight:500}
.fh-scores{display:flex;gap:8px;flex-shrink:0}
.fh-sc{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:8px 12px;text-align:center;min-width:68px}
.fh-sv{font-family:var(--mono);font-size:20px;font-weight:500;color:#fff;line-height:1;margin-bottom:2px}
.fh-sl{font-size:8px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono)}
.fh-kpis{display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;overflow:hidden}
.fh-kpi{flex:1;padding:10px 14px;border-right:1px solid rgba(255,255,255,.08)}
.fh-kpi:last-child{border-right:none}
.fh-kl{font-size:9px;font-family:var(--mono);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.fh-kv{font-family:var(--mono);font-size:15px;font-weight:500;color:#fff}
.stabs{background:var(--bg);border-bottom:1px solid var(--border);display:flex;padding:0 16px;overflow-x:auto;position:sticky;top:80px;z-index:10;box-shadow:var(--sh1);scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{height:40px;padding:0 11px;font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;white-space:nowrap;transition:all .15s;user-select:none;flex-shrink:0}
.stab:hover{color:var(--text)}.stab.on{color:var(--blue);border-bottom-color:var(--blue)}
.cbody{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.sec{display:none}.sec.on{display:flex;flex-direction:column;gap:14px}
@keyframes fu{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.sec.on{animation:fu .18s ease forwards}
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;box-shadow:var(--sh1);overflow:hidden}
.ch{padding:11px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ct{font-size:12.5px;font-weight:600;color:var(--text)}.cm{font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ca{position:relative;padding:12px 14px}.ca canvas{display:block}
.mg{display:grid;grid-template-columns:repeat(4,1fr)}
.mi{padding:11px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.mi:nth-child(4n){border-right:none}.mi:nth-last-child(-n+4){border-bottom:none}
.ml{font-size:8.5px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mv{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text);line-height:1;margin-bottom:2px}
.ms{font-size:10px;color:var(--text3)}
.gn{color:var(--green)!important}.rd{color:var(--red)!important}.am{color:var(--amber)!important}
.chg{font-size:10px;font-family:var(--mono)}.up{color:var(--green)}.dn{color:var(--red)}.fl{color:var(--text3)}
.leg{display:flex;gap:10px;padding:5px 14px 10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.ll{width:14px;height:2px;border-radius:1px}.ld{width:14px;height:0;border-top:2px dashed}
.pr{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);gap:8px}
.pr:last-child{border-bottom:none}
.p-rk{font-family:var(--mono);font-size:10px;color:var(--text3);width:18px;text-align:right;flex-shrink:0}
.p-tk{font-family:var(--mono);font-size:11.5px;font-weight:500;width:48px;flex-shrink:0}
.p-hl{color:var(--blue)}.p-bw{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.p-b{height:100%;border-radius:3px}.p-v{font-family:var(--mono);font-size:11.5px;width:56px;text-align:right;flex-shrink:0}
.ftbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11.5px}
.ftbl th{padding:7px 12px;text-align:left;background:var(--bg2);border-bottom:1px solid var(--border2);font-size:8.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.ftbl td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.ftbl td:last-child{text-align:right;color:var(--text);font-weight:500}.ftbl tr:last-child td{border-bottom:none}
.evt-row{display:flex;align-items:flex-start;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px}
.evt-row:last-child{border-bottom:none}
.evt-dt{font-family:var(--mono);font-size:9px;color:var(--text3);width:48px;flex-shrink:0;padding-top:2px}
.evt-tag{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:2px;flex-shrink:0;margin-top:1px;letter-spacing:.3px}
.evt-body{flex:1}
.evt-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.evt-detail{font-size:10.5px;color:var(--text3);line-height:1.4}
.tag-earn{background:var(--blue2);color:var(--blue)}.tag-div{background:var(--green2);color:var(--green)}
.tag-cap{background:#f5f3ff;color:var(--purple)}.tag-mgmt{background:var(--amber2);color:var(--amber)}
.tag-cred{background:var(--red2);color:var(--red)}
</style>
</head>

    <div class="sb-search"><input id="fsearch" placeholder="Search fundвЂ¦" oninput="filterSB(this.value)"></div>

</div>
<script>
const Q24=['Q1\'20','Q2','Q3','Q4','Q1\'21','Q2','Q3','Q4','Q1\'22','Q2','Q3','Q4','Q1\'23','Q2','Q3','Q4','Q1\'24','Q2','Q3','Q4','Q1\'25','Q2','Q3','Q4'];
const YEARS=['2025','2026','2027','2028','2029','2030+'];
const F='DM Mono',TC='#8a97a8',GC='rgba(226,231,239,.55)';
function bO(ex={}){
  return {responsive:true,maintainAspectRatio:false,animation:{duration:300},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#e2e7ef',borderWidth:1,titleColor:'#4a5870',bodyColor:'#0d1b2a',titleFont:{family:F,size:9},bodyFont:{family:F,size:11},padding:7},...(ex.plugins||{})},
    ...Object.fromEntries(Object.entries(ex).filter(([k])=>k!=='plugins'))};
}
function ax(yl,mn){
  const yax={grid:{color:GC,drawTicks:false},ticks:{color:TC,font:{family:F,size:8},...(yl?{callback:v=>v+yl}:{})},border:{color:'#e2e7ef'}};
  if(mn!==undefined)yax.min=mn;
  return {x:{grid:{color:GC,drawTicks:false},ticks:{color:TC,font:{family:F,size:8},maxTicksLimit:8},border:{color:'#e2e7ef'}},y:yax};
}
function sax(){return {x:{stacked:true,grid:{display:false},ticks:{color:TC,font:{family:F,size:8},maxTicksLimit:8},border:{color:'#e2e7ef'}},y:{stacked:true,grid:{color:GC},ticks:{color:TC,font:{family:F,size:8}},border:{color:'#e2e7ef'}}};}
function rl(y,col){return {type:'line',label:'ref',data:Q24.map(()=>y),borderColor:col,borderDash:[5,5],borderWidth:1.2,pointRadius:0,fill:false};}
function gen(b,v,t,n=24){const d=[];let x=b;for(let i=0;i<n;i++){x+=t+(Math.random()-.48)*v;d.push(+Math.max(0,x).toFixed(3));}return d;}
function qF(v){return Math.abs(v)>=1000?'$'+Math.round(Math.abs(v)/1000)+'B':'$'+Math.round(Math.abs(v))+'M';}
const CH={};
function mkC(id,cfg){const el=document.getElementById(id);if(!el)return null;if(CH[id]){try{CH[id].destroy();}catch(e){}}CH[id]=new Chart(el,cfg);return CH[id];}
function dn(id,labels,data,cols,pos='bottom'){mkC(id,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:cols,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:true,position:pos,labels:{font:{family:F,size:9},color:'#4a5870',boxWidth:8,padding:4}},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw}%`}}}}});}
function mi(l,v,s,cls){return `<div class="mi"><div class="ml">${l}</div><div class="mv${cls?' '+cls:''}">${v}</div><div class="ms">${s||''}</div></div>`;}
function miv(l,v,chg,up,s){return `<div class="mi"><div class="ml">${l}</div><div class="mv">${v}</div><div class="chg ${up?'up':'dn'}">${chg}</div></div>`;}
function leg(...items){return '<div class="leg">'+items.map(([col,dash,label])=>`<div class="li"><div class="${dash?'ld':'ll'}" style="${dash?'border-color:'+col:'background:'+col}"></div>${label}</div>`).join('')+'</div>';}

// в”Ђв”Ђ FUNDS вЂ” fetched from data/funds.json + data/timeseries/*.json в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let FUNDS=[];

function mapFundDetail(f, mkt){
  const m=(mkt&&mkt[f.ticker])||{};
  const fee=f.management_structure==='internal'?0:(f.base_mgmt_fee_pct!=null?f.base_mgmt_fee_pct:null);
  return {
    ticker:f.ticker,
    name:f.manager||f.ticker,
    manager:f.manager||'вЂ”',
    management_structure:f.management_structure||'external',
    type:f.type,
    exchange:f.type==='traded'?'NYSE/NASDAQ':'Non-Traded',
    inception:'вЂ”',
    strategy:f.top_sector_1||'Diversified',
    nav:f.nav_per_share,
    navChg:f.nav_per_share_qoq_change,
    yield:f.weighted_avg_yield,
    lev:f.leverage,
    na:f.na_pct_cost,
    pik:f.pik_pct,
    fl:f.first_lien_pct,
    sl:f.second_lien_pct,
    sub:f.subordinated_pct,
    eq:f.equity_pct,
    cov:f.nii_coverage,
    fee:fee,
    inc:f.incentive_fee_pct,
    hurdle:f.hurdle_rate_pct,
    lookback:false,
    scoreM:null,scoreU:null,scoreB:null,
    na_m:f.net_assets_mn,
    inv:f.total_investments_fv_mn,
    debt:f.total_debt_mn,
    cash:f.cash_mn,
    undrawn:f.unused_capacity_mn,
    cod:f.cost_of_debt_pct,
    portcos:f.num_portfolio_companies,
    avgPos:(f.net_assets_mn&&f.num_portfolio_companies)?Math.round(f.net_assets_mn/f.num_portfolio_companies):null,
    top10:null,
    sponsor:f.sponsored_pct,
    flt:f.floating_rate_pct,
    geo:null,
    waEB:null,waDDE:null,waIC:null,
    nii:f.nii_per_share,
    dps:f.dividend_per_share,
    spill:null,
    pnav:m.price_to_nav||f.price_to_nav||null,
    vol30:m.volume_30d_mn||null,
    si:m.short_interest_pct||null,
    latest_quarter:f.latest_quarter||'',
    latest_period_end:f.latest_period_end||'',
    edgar_url:f.edgar_url||null,
    ntC:null,ntNAV:null,subs:null,reds:null,drip:null,gate:null,gateHit:false,
    // will be populated from timeseries
    _ts: null,
  };
}

let activeTicker=(new URLSearchParams(location.search).get('ticker'))||'ARCC';
let activeSec='overview',builtSecs=new Set(),currentFund=null;

function buildSB(){
  document.getElementById('fundList').innerHTML=FUNDS.map(f=>`
    <div class="sb-fund ${f.ticker===activeTicker?'on':''}" data-tk="${f.ticker}" onclick="loadFund('${f.ticker}')">
      <span class="sb-tk">${f.ticker}</span>
      <div class="sb-info"><span class="sb-nm">${f.name}</span><span class="sb-meta">${f.manager} В· $${(f.na_m/1000).toFixed(1)}B</span></div>
      <span class="sb-type ${f.type==='traded'?'t-badge':'nt-badge'}">${f.type==='traded'?'T':'NT'}</span>
    </div>`).join('');
}
function filterSB(q){const ql=q.toLowerCase();document.querySelectorAll('.sb-fund').forEach(el=>{el.style.display=(el.dataset.tk.toLowerCase().includes(ql)||el.querySelector('.sb-nm').textContent.toLowerCase().includes(ql))?'':'none';});}
function loadFund(ticker){
  activeTicker=ticker;activeSec='overview';builtSecs=new Set();
  Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});Object.keys(CH).forEach(k=>delete CH[k]);
  document.querySelectorAll('.sb-fund').forEach(el=>el.classList.toggle('on',el.dataset.tk===ticker));
  currentFund=FUNDS.find(x=>x.ticker===ticker)||FUNDS[0];
  renderFund(currentFund);window.scrollTo(0,0);
}
function switchSec(s,el){
  activeSec=s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));el.classList.add('on');
  document.querySelectorAll('.sec').forEach(b=>b.classList.remove('on'));
  const bl=document.getElementById('sec-'+s);
  if(bl){
    bl.classList.add('on');
    if(!builtSecs.has(s)&&currentFund){
      const ro=new ResizeObserver(entries=>{
        for(const e of entries){if(e.contentRect.width>10){ro.disconnect();buildSec(s,currentFund);return;}}
      });
      ro.observe(bl);
      setTimeout(()=>{ro.disconnect();if(!builtSecs.has(s))buildSec(s,currentFund);},400);
    }
  }
}

function renderFund(f){
  const T=f.type==='traded',NT=f.type==='nontraded';
  const up=f.navChg!=null?f.navChg>=0:true;
  document.getElementById('content').innerHTML=`
  <div class="fh"><div class="fh-grid"></div><div class="fh-in">

      {dt:'Q4 2024',type:'earn',title:'Q4 2024 Earnings',detail:`Full-year NII $${(f.nii*3.88).toFixed(3)}/sh В· Total return ${(f.yield*.82).toFixed(1)}%`},
      {dt:'Q3 2024',type:'cap',title:'Unsecured Notes Issuance',detail:`$${Math.round(f.debt*.08/100)*100}M issued В· Fixed rate В· Due 2029`},
    ];
    const TM={earn:'tag-earn',div:'tag-div',cap:'tag-cap',mgmt:'tag-mgmt',cred:'tag-cred'};
    const LM={earn:'EARNINGS',div:'DIVIDEND',cap:'CAPITAL',mgmt:'MGMT',cred:'CREDIT'};
    document.getElementById('evt-feed').innerHTML=EVS.map(e=>`<div class="evt-row"><span class="evt-dt">${e.dt}</span><span class="evt-tag ${TM[e.type]}">${LM[e.type]}</span><div class="evt-body"><div class="evt-title">${e.title}</div><div class="evt-detail">${e.detail}</div></div></div>`).join('');
  }
}

// в”Ђв”Ђ INIT вЂ” async fetch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function init(){
  // Show loading in sidebar
  document.getElementById('fundList').innerHTML=`<div style="padding:20px 14px;font-family:var(--mono);font-size:11px;color:var(--text3)">Loading 68 fundsвЂ¦</div>`;
  document.getElementById('content').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:60vh;font-family:var(--mono);font-size:12px;color:var(--text3)">Fetching real dataвЂ¦</div>`;

  try{
    const [fundsRes, mktRes] = await Promise.all([
      fetch('data/funds.json'),
      fetch('data/market.json').catch(()=>({json:()=>({})}))
    ]);
    const fundsRaw = await fundsRes.json();
    const mktRaw = await mktRes.json().catch(()=>({}));
    FUNDS = fundsRaw.map(f=>mapFundDetail(f, mktRaw));
    buildSB();
    loadFund(activeTicker);
  }catch(err){
    console.error('Failed to load fund data:',err);
    document.getElementById('content').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px"><div style="font-family:var(--mono);font-size:13px;color:var(--red)">вљ  Could not load data</div><div style="font-family:var(--mono);font-size:11px;color:var(--text3)">Serve via HTTP (not file://). Run: python3 -m http.server 8000</div><div style="font-family:var(--mono);font-size:10px;color:var(--text4)">${err.message}</div></div>`;
  }
}

// Override loadFund to also fetch timeseries for the selected fund
const _origLoadFund = loadFund;
async function loadFund(ticker){
  // First do the sync render with whatever data we have
  activeTicker=ticker;activeSec='overview';builtSecs=new Set();
  Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});Object.keys(CH).forEach(k=>delete CH[k]);
  document.querySelectorAll('.sb-fund').forEach(el=>el.classList.toggle('on',el.dataset.tk===ticker));
  currentFund=FUNDS.find(x=>x.ticker===ticker)||FUNDS[0];
  if(!currentFund)return;

  // Fetch timeseries for this fund
  try{
    const tsRes = await fetch(`data/timeseries/${ticker}.json`);
    const tsData = await tsRes.json();
    currentFund._ts = tsData;
  }catch(e){
    currentFund._ts = null;
  }

  renderFund(currentFund);
  window.scrollTo(0,0);
}

document.addEventListener('DOMContentLoaded', init);
</script>
